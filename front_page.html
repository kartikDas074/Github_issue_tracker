<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github_issue_tracker|Login </title>

    <!-- daisy ui and tailwind setup -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome setup -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- Google font-GEISt -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
      
      <!-- style -->
       <style>
        *{
            font-family: "Geist", sans-serif;;
        }
        .High{  
            background-color:#FEECEC;
            
            color:#EF4444;
            padding: 3px 20px;
            border-radius: 10px;
        }
        .Medium{
            background-color:#FFF6D1 ;
            color:#F59E0B;
            padding: 3px 10px;
            border-radius: 10px;
        }
        .Low{
            background-color:#EEEFF2;
            color:#9CA3AF;
            padding: 3px 10px;
            border-radius: 30px;
        }
        .Enhancement{
           color:#00A96E;
           background-color: #DEFCE8;
            padding: 3px 5px;
            border-radius: 30px;
        }
        .txt{
            font-size: 12px;
        }
        
        .card{
            border-radius:5px;
            padding: 6px 5px;
            display: flex;
            flex-direction: col;
            justify-content: center;
            min-height: 260px;
            gap:8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            background-color: #FFFFFF;
            width: 100%;
            max-width: 350px;
        }
        .flexing{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ht{
            height: 50px;
        }
        .green_border{
            border-top: 4px solid green;
            
        }
        .purple_border{
             border-top: 4px solid purple;
            
        }
       </style>
       <!-- class="card  border-t-green-500 border-t-[4px] rounded-[5px] px-[5px] py-[10px] md:px-[10px] flex flex-col space-y-[8px]" -->
</head>
<body>
    <header class=" w-full max-w-[90vw] md:max-w-[80vw] flex flex-col md:flex-row
    justify-center  md:justify-between items-center mx-auto py-[10px]">
        <div class="flex space-x-1 items-center mb-[16px]">
            <div class="h-[50px] w-[50px]"><img src="assets/github-logo.png" alt="github logo"></div>
            <h1 class="text-[14px] md:text-[24px] text-[#1F2937] font-semibold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex flex-col  md:flex-row space-y-1 md:space-x-1 items-center ">
              <div class=" w-full   relative mb-[16px] md:mb-[0px]">
                 <i id="icon" class="fa-solid fa-magnifying-glass absolute translate-y-4 translate-x-1"></i>
                 <input class=" w-full border border-black/10 bg-base-200 rounded-[8px] px-[30px] py-[5px] md:px-[30px] md:py-[10px] " type="text" name="" id="search" placeholder="Search issues...">
              </div>
              <button  id="srcbar" class="btn btn-primary w-full md:w-auto">
                <i class="fa-solid fa-plus"></i>
                New Issue
              </button>
        </div>
    </header>
    <div class="border border-black/10"></div>
    <section class="w-full max-w-[90vw] md:max-w-[80vw] flex flex-col md:flex-row shadow-sm  mx-auto my-[30px] rounded-[5px] py-[10px] px-[10px] space-x-2 space-y-2 md:space-y-0 justify-center items-center md:justify-start">
       <button id="all" class="btn btn-primary w-[80%] md:w-[150px] ">All</button>
       <button id="opend" class="btn w-[80%] md:w-[150px] text-[#64748B]">Open</button>
       <button id="closed" class="btn w-[80%] md:w-[150px] text-[#64748B]">Close</button>
    </section>
    <section class="w-full max-w-[90vw] md:max-w-[80vw] mx-auto my-[30px] shadow bg-[#FBFBFB]">
       <header class="shadow-sm bg-[#FFFFFF] mb-[30px] flex flex-col md:flex-row space-x-1 space-y-2 justify-between items-center px-[20px] py-[20px]">
        <div class="flex space-x-1 justify-center items-center">
            <div><img src="assets/Aperture.png" alt=""></div>
            <div>
                <h1 class="text-[#1F2937] text-[20px] font-semibold"><span id="cnt"></span> Issues</h1>
                <p class="text-[#64748B] text-[16px]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex space-x-2 justify-center items-center">
            <div class="flex justify-center items-center space-x-2"><div class="h-[10px] w-[10px] rounded-[50%] bg-green-500">
            </div>
            <h1 class="text-[#1F2937]">Open</h1></div>
            <div class="flex justify-center items-center space-x-2"><div class="h-[10px] w-[10px] rounded-[50%] bg-purple-500">
            </div>
            <h1 class="text-[#1F2937]">Closed</h1></div>
            
        </div>
       </header>
       <div id="cardHolder" class="w-[90%] grid grid-cols-1 md:grid-cols-4 gap-[10px] mx-auto">
       </div>
    </section>
    <script src="common.js"></script>
    <script src="script.js"></script>
</body>
</html>
